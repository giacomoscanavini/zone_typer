<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Zone Typers V1.5</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main id="game-shell">
    <canvas id="game" width="960" height="640" aria-label="Zone Typers game canvas"></canvas>
    <section id="instructions">
      <strong>Controls:</strong> type the word shown to the right of a lane to fire in that lane. Words get harder by stage. Backspace deletes. Enter restarts after game over.
    </section>
  </main>
  <script src="game.js"></script>
</body>
</html>
